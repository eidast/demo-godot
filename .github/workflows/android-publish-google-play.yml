name: Publish Existing Bundle To Google Play

on:
  workflow_dispatch:
    inputs:
      build_run_id:
        description: GitHub Actions run id of a successful Build Android Release Bundle run
        required: true
        type: string
      track:
        description: Google Play track
        required: true
        default: internal
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      release_status:
        description: Google Play release status
        required: true
        default: draft
        type: choice
        options:
          - completed
          - draft
          - inProgress
          - halted
      user_fraction:
        description: Staged rollout fraction, required for inProgress
        required: false
        type: string
      release_name:
        description: Optional Google Play release name
        required: false
        type: string
      artifact_name:
        description: Artifact name generated by the build workflow
        required: true
        default: android-release-bundle
        type: string
      changes_not_sent_for_review:
        description: Only set true if this app requires explicit review deferral
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  actions: read
  id-token: write

concurrency:
  group: google-play-publish-${{ inputs.build_run_id }}-${{ inputs.track }}
  cancel-in-progress: false

jobs:
  publish-android:
    runs-on: ubuntu-latest
    environment: google-play
    env:
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER || secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_SERVICE_ACCOUNT_EMAIL: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL || secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
      GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate required configuration
        shell: bash
        run: |
          set -euo pipefail

          if [[ -z "${GCP_SERVICE_ACCOUNT_EMAIL:-}" ]]; then
            echo "Missing required environment value: GCP_SERVICE_ACCOUNT_EMAIL" >&2
            exit 1
          fi

          if [[ -z "${GCP_WORKLOAD_IDENTITY_PROVIDER:-}" && -z "${GOOGLE_PLAY_SERVICE_ACCOUNT_JSON:-}" ]]; then
            echo "Configure either GCP_WORKLOAD_IDENTITY_PROVIDER or GOOGLE_PLAY_SERVICE_ACCOUNT_JSON." >&2
            exit 1
          fi

      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: dist/android-release
          run-id: ${{ inputs.build_run_id }}
          github-token: ${{ github.token }}

      - name: Read release metadata
        id: metadata
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import os
          import pathlib

          metadata = json.loads(pathlib.Path("dist/android-release/release-metadata.json").read_text(encoding="utf-8"))
          github_output = pathlib.Path(os.environ["GITHUB_OUTPUT"])
          with github_output.open("a", encoding="utf-8") as fh:
              for key in ("package_name", "version_name", "build_number", "git_sha", "ref_name", "source_run_url"):
                  fh.write(f"{key}={metadata[key]}\n")
          PY

      - name: Validate release policy
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ inputs.track }}" == "production" && "${{ steps.metadata.outputs.ref_name }}" != "main" ]]; then
            echo "Production releases must come from a build created on the main branch." >&2
            exit 1
          fi

          if [[ ! -f dist/android-release/gameoflife-release.aab ]]; then
            echo "Missing gameoflife-release.aab in downloaded artifact." >&2
            exit 1
          fi

      - name: Authenticate to Google Cloud with Workload Identity Federation
        id: auth_wif
        if: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && env.GCP_SERVICE_ACCOUNT_EMAIL != '' }}
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT_EMAIL }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/androidpublisher

      - name: Authenticate to Google Cloud with service account key
        id: auth_key
        if: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER == '' && env.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON != '' && env.GCP_SERVICE_ACCOUNT_EMAIL != '' }}
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ env.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          service_account: ${{ env.GCP_SERVICE_ACCOUNT_EMAIL }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/androidpublisher

      - name: Publish bundle to Google Play
        env:
          GOOGLE_PLAY_ACCESS_TOKEN: ${{ steps.auth_wif.outputs.access_token || steps.auth_key.outputs.access_token }}
        run: |
          python3 scripts/release/upload_play_bundle.py \
            --package-name "${{ steps.metadata.outputs.package_name }}" \
            --bundle-path "dist/android-release/gameoflife-release.aab" \
            --track "${{ inputs.track }}" \
            --release-status "${{ inputs.release_status }}" \
            --release-name "${{ inputs.release_name }}" \
            ${{ inputs.user_fraction != '' && format('--user-fraction "{0}"', inputs.user_fraction) || '' }} \
            ${{ inputs.changes_not_sent_for_review && '--changes-not-sent-for-review' || '' }}
